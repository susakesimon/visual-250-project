<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClothingID — Live Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0d1117;
    --border:    #1e2a35;
    --green:     #00ff88;
    --green-dim: #00884a;
    --cyan:      #00d4ff;
    --yellow:    #ffd000;
    --magenta:   #e040fb;
    --muted:     #4a5568;
    --text:      #c9d1d9;
    --scan-line: rgba(0, 255, 136, 0.04);
    --glow:      0 0 12px rgba(0, 255, 136, 0.35);
  }

  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scan-line overlay */
  body::after {
    content: "";
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      var(--scan-line) 3px,
      var(--scan-line) 4px
    );
    z-index: 9999;
  }

  /* ── Header ──────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    text-shadow: var(--glow);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: var(--glow);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: .75rem;
    color: var(--muted);
  }

  #connStatus { transition: color .3s; }
  #connStatus.connected    { color: var(--green); }
  #connStatus.disconnected { color: #ff4444; }
  #connStatus.waiting      { color: var(--yellow); }

  #scanCount { color: var(--cyan); }

  /* ── Capture button ──────────────────────────────────── */
  #captureBtn {
    padding: 8px 22px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: inherit;
    font-size: .8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  #captureBtn:hover {
    background: rgba(0,255,136,.1);
    box-shadow: var(--glow);
  }
  #captureBtn:active { transform: scale(.97); }
  #captureBtn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Main grid ───────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* ── OLED panel (left) ───────────────────────────────── */
  .oled-wrap {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    gap: 20px;
  }

  .oled-label {
    font-size: .65rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .oled-screen {
    width: 264px;
    height: 132px;
    background: #000;
    border: 2px solid var(--green-dim);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px 12px;
    gap: 6px;
    box-shadow: inset 0 0 12px rgba(0,0,0,.8), 0 0 8px rgba(0,255,136,.15);
    position: relative;
    overflow: hidden;
  }

  /* phosphor glow pulse on new data */
  .oled-screen.flash {
    animation: phosphor .4s ease-out;
  }
  @keyframes phosphor {
    0%  { box-shadow: inset 0 0 12px rgba(0,0,0,.8), 0 0 24px rgba(0,255,136,.7); }
    100%{ box-shadow: inset 0 0 12px rgba(0,0,0,.8), 0 0  8px rgba(0,255,136,.15); }
  }

  .oled-line {
    font-size: .7rem;
    color: var(--green);
    text-shadow: 0 0 6px var(--green);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }
  .oled-line.dim   { color: var(--green-dim); text-shadow: none; font-size: .62rem; }
  .oled-line.blink { animation: blink 1s infinite; }

  .oled-cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--green);
    vertical-align: middle;
    animation: blink .8s infinite;
    margin-left: 2px;
  }

  /* thumbnail under OLED */
  #thumbWrap {
    width: 264px;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  #thumbPlaceholder {
    color: var(--muted);
    font-size: .7rem;
    letter-spacing: 1px;
  }

  /* ── Data panel (right) ──────────────────────────────── */
  .data-panel {
    overflow-y: auto;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .data-panel::-webkit-scrollbar { width: 4px; }
  .data-panel::-webkit-scrollbar-track { background: transparent; }
  .data-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* empty state */
  #emptyState {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
  }
  #emptyState .big {
    font-size: 2.5rem;
    opacity: .15;
  }
  #emptyState p { font-size: .8rem; letter-spacing: 1px; }

  /* result sections */
  .section { display: none; }
  .section.visible { display: block; }

  .section-label {
    font-size: .65rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .item-name {
    font-size: 1.5rem;
    color: var(--green);
    text-shadow: var(--glow);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .price-range {
    font-size: .95rem;
    color: var(--yellow);
    margin-bottom: 18px;
  }

  .style-desc {
    font-size: .8rem;
    color: var(--text);
    line-height: 1.8;
    border-left: 2px solid var(--green-dim);
    padding-left: 14px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    padding: 3px 12px;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-size: .72rem;
    letter-spacing: 1px;
  }

  .brands {
    font-size: .8rem;
    color: var(--muted);
  }
  .brands span { color: var(--cyan); }

  /* shopping grid */
  .shop-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .shop-card {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.02);
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, background .15s;
  }
  .shop-card:hover {
    border-color: var(--green-dim);
    background: rgba(0,255,136,.04);
  }

  .shop-thumb {
    width: 64px; height: 64px;
    object-fit: cover;
    background: #111;
    border: 1px solid var(--border);
  }

  .shop-info { overflow: hidden; }
  .shop-title { font-size: .8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shop-source{ font-size: .7rem; color: var(--muted); margin-top: 3px; }

  .shop-price { font-size: .9rem; color: var(--yellow); white-space: nowrap; }

  /* trend section */
  .trend-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .trend-badge {
    padding: 4px 14px;
    font-size: .78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid currentColor;
    white-space: nowrap;
  }
  .trend-badge.cold     { color: var(--muted); }
  .trend-badge.rising   { color: var(--yellow); }
  .trend-badge.trending { color: var(--magenta); }
  .trend-badge.viral    { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,.5); }

  .trend-meter {
    flex: 1;
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .trend-fill {
    height: 100%;
    width: 0%;
    transition: width .6s ease, background .6s ease;
  }

  .trend-score-val {
    font-size: .78rem;
    color: var(--muted);
    min-width: 28px;
    text-align: right;
  }

  .trend-count {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* timestamp footer */
  #tsFooter {
    font-size: .7rem;
    color: var(--muted);
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot"></div>
    ClothingID
    <span style="color:var(--muted);font-size:.7rem;letter-spacing:1px">LIVE DASHBOARD</span>
  </div>
  <div class="status-bar">
    <span>SSE</span>
    <span id="connStatus" class="waiting">◉ connecting…</span>
    <span>SCANS <span id="scanCount" style="color:var(--cyan)">0</span></span>
    <button id="captureBtn">▶ Capture</button>
    <button id="resetBtn" style="padding:8px 14px;background:transparent;border:1px solid var(--muted);color:var(--muted);font-family:inherit;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;" title="Reset trend session">↺ Reset</button>
  </div>
</header>

<main>
  <!-- Left: OLED mimic -->
  <div class="oled-wrap">
    <div class="oled-label">SSD1306 128×64</div>
    <div class="oled-screen" id="oledScreen">
      <div class="oled-line blink" id="oledL1">CLOTHINGID v1.0</div>
      <div class="oled-line dim"   id="oledL2">waiting for scan…</div>
      <div class="oled-line dim"   id="oledL3"></div>
      <div class="oled-line dim"   id="oledL4"><span class="oled-cursor"></span></div>
    </div>
    <div class="oled-label" style="margin-top:8px">CAPTURED FRAME</div>
    <div id="thumbWrap">
      <span id="thumbPlaceholder">NO FRAME</span>
      <img id="thumb" alt="captured frame"/>
    </div>
  </div>

  <!-- Right: data readout -->
  <div class="data-panel">
    <div id="emptyState">
      <div class="big">◫</div>
      <p>Point camera at clothing and press Capture</p>
    </div>

    <div class="section" id="secMain">
      <div class="section-label">Identified Item</div>
      <div class="item-name" id="itemName">—</div>
      <div class="price-range" id="priceRange">—</div>
      <div class="style-desc" id="styleDesc">—</div>
    </div>

    <div class="section" id="secTrend">
      <div class="section-label">Trend Score</div>
      <div class="trend-row">
        <span class="trend-badge cold" id="trendBadge">—</span>
        <div class="trend-meter"><div class="trend-fill" id="trendFill"></div></div>
        <span class="trend-score-val" id="trendScoreVal">0</span>
      </div>
      <div class="trend-count">Scanned <span id="trendCount">0</span>× this session</div>
    </div>

    <div class="section" id="secTags">
      <div class="section-label">Tags</div>
      <div class="tags" id="tagsWrap"></div>
    </div>

    <div class="section" id="secBrands">
      <div class="section-label">Likely Brands</div>
      <div class="brands" id="brandsWrap"></div>
    </div>

    <div class="section" id="secShop">
      <div class="section-label">Google Shopping</div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>

    <div id="tsFooter" style="display:none">
      Last scan: <span id="tsVal">—</span>
    </div>
  </div>
</main>

<script>
const SERVER = "";   // relative — dashboard is served from the Flask server itself
let scanCount = 0;

// ── SSE connection ────────────────────────────────────────
function connectSSE() {
  const es = new EventSource(`${SERVER}/stream`);

  es.onopen = () => {
    setStatus("connected", "◉ live");
  };

  es.onerror = () => {
    setStatus("disconnected", "◉ reconnecting…");
    // browser auto-reconnects on EventSource error
  };

  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.status) return;   // "no results yet" placeholder
      render(data);
    } catch (_) {}
  };
}

function setStatus(cls, text) {
  const el = document.getElementById("connStatus");
  el.className = cls;
  el.textContent = text;
}

// ── Capture button ─────────────────────────────────────────
document.getElementById("captureBtn").addEventListener("click", async () => {
  const btn = document.getElementById("captureBtn");
  btn.disabled = true;
  btn.textContent = "⏳ scanning…";
  oledUpdate("SCANNING…", "sending trigger", "", "");
  try {
    const r = await fetch(`${SERVER}/trigger`, { method: "POST" });
    if (!r.ok) throw new Error("server error");
    btn.textContent = "⏳ waiting for Pi…";
    // Re-enable after 10s (result will arrive via SSE)
    setTimeout(() => { btn.disabled = false; btn.textContent = "▶ Capture"; }, 10000);
  } catch (e) {
    alert("Could not reach server: " + e.message);
    btn.disabled = false;
    btn.textContent = "▶ Capture";
  }
});

// ── Render result ─────────────────────────────────────────
function render(r) {
  scanCount++;
  document.getElementById("scanCount").textContent = scanCount;
  document.getElementById("captureBtn").disabled = false;
  document.getElementById("captureBtn").textContent = "▶ Capture";

  // OLED mimic
  const trendLine = r.trend_label
    ? `${r.trend_label.toUpperCase()} · ${r.trend_score}pts`
    : "";
  oledUpdate(
    (r.item_name || "?").substring(0, 21),
    r.price_range || "",
    trendLine.substring(0, 21),
    (r.brand_guesses || []).join(" / ").substring(0, 21)
  );
  flashOled();

  // Trend
  if (r.trend_label) {
    const colorMap = {
      Cold:     "var(--muted)",
      Rising:   "var(--yellow)",
      Trending: "var(--magenta)",
      Viral:    "#ff4444",
    };
    const badge = document.getElementById("trendBadge");
    badge.textContent = r.trend_label;
    badge.className   = "trend-badge " + r.trend_label.toLowerCase();
    const fill = document.getElementById("trendFill");
    fill.style.width      = (r.trend_score || 0) + "%";
    fill.style.background = colorMap[r.trend_label] || "var(--muted)";
    document.getElementById("trendScoreVal").textContent = r.trend_score || 0;
    document.getElementById("trendCount").textContent    = r.item_count  || 1;
  }

  // Main info
  document.getElementById("itemName").textContent  = r.item_name  || "—";
  document.getElementById("priceRange").textContent = r.price_range || "—";
  document.getElementById("styleDesc").textContent  = r.style_description || "—";

  // Tags
  const tagsWrap = document.getElementById("tagsWrap");
  tagsWrap.innerHTML = (r.tags || []).map(t =>
    `<span class="tag">#${esc(t)}</span>`).join("");

  // Brands
  document.getElementById("brandsWrap").innerHTML =
    (r.brand_guesses || []).map(b => `<span>${esc(b)}</span>`).join(
      `<span style="color:var(--border)"> / </span>`);

  // Shopping
  const grid = document.getElementById("shopGrid");
  grid.innerHTML = (r.shopping_results || []).slice(0,6).map(h => `
    <a class="shop-card" href="${esc(h.link)}" target="_blank" rel="noopener">
      <img class="shop-thumb" src="${esc(h.thumbnail)}" alt="" onerror="this.style.display='none'">
      <div class="shop-info">
        <div class="shop-title">${esc(h.title)}</div>
        <div class="shop-source">${esc(h.source)}</div>
      </div>
      <div class="shop-price">${esc(h.price)}</div>
    </a>`).join("");

  // Timestamp
  if (r.timestamp) {
    document.getElementById("tsVal").textContent = r.timestamp;
    document.getElementById("tsFooter").style.display = "block";
  }

  // Show sections, hide empty state
  document.getElementById("emptyState").style.display = "none";
  ["secMain","secTrend","secTags","secBrands","secShop"].forEach(id =>
    document.getElementById(id).classList.add("visible"));
}

// ── OLED helpers ───────────────────────────────────────────
function oledUpdate(l1, l2, l3, l4) {
  ["oledL1","oledL2","oledL3","oledL4"].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove("blink");
    el.innerHTML = [l1,l2,l3,l4][i] + (i===3 ? '<span class="oled-cursor"></span>' : "");
  });
}

function flashOled() {
  const s = document.getElementById("oledScreen");
  s.classList.remove("flash");
  void s.offsetWidth;
  s.classList.add("flash");
}

function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Reset button ───────────────────────────────────────────
document.getElementById("resetBtn").addEventListener("click", async () => {
  if (!confirm("Reset trend session? All scan history will be cleared.")) return;
  await fetch(`${SERVER}/reset`, { method: "POST" });
  document.getElementById("trendBadge").textContent  = "—";
  document.getElementById("trendBadge").className    = "trend-badge cold";
  document.getElementById("trendFill").style.width   = "0%";
  document.getElementById("trendScoreVal").textContent = "0";
  document.getElementById("trendCount").textContent  = "0";
});

// ── Boot ───────────────────────────────────────────────────
connectSSE();
</script>
</body>
</html>
